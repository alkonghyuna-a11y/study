<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="공부시간">
<title>공부시간 트래커</title>
<style>
  :root{
    --bg:#0f1115; --surface:#1a1d24; --surface-2:#232732; --line:#2c313d;
    --text:#e8e6e1; --muted:#7a828f; --accent:#f0a830; --accent-2:#3dd6b0; --danger:#e06a5a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) 0 env(safe-area-inset-left);overflow-x:hidden}
  .num{font-variant-numeric:tabular-nums;font-family:ui-monospace,"SF Mono","Menlo",monospace}

  header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 6px}
  header h1{font-size:17px;font-weight:700;letter-spacing:.01em}
  .gear{background:var(--surface);border:1px solid var(--line);color:var(--muted);width:38px;height:38px;border-radius:50%;font-size:17px;cursor:pointer}

  nav.tabs{display:flex;gap:4px;padding:4px 14px 10px;overflow-x:auto}
  .tab{background:none;border:none;color:var(--muted);font-size:14px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap}
  .tab.active{color:var(--bg);background:var(--accent)}

  main{flex:1;overflow-y:auto;padding:0 16px calc(28px + env(safe-area-inset-bottom))}
  .view{display:none}.view.active{display:block}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
  .section-title{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:18px 4px 10px}
  .row{display:flex;gap:10px}
  .btn{border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;padding:13px 18px}
  .btn-accent{background:var(--accent);color:var(--bg)}
  .btn-2{background:var(--accent-2);color:var(--bg)}
  .btn-surface{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
  .btn-ghost{background:none;color:var(--danger);border:1px solid var(--line)}
  .btn:active{transform:scale(.97)}
  .btn-block{width:100%}
  .muted{color:var(--muted)}.small{font-size:13px}

  /* 타이머 */
  .book-chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 4px}
  .chip{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:9px 15px;font-size:14px;white-space:nowrap;cursor:pointer;flex:none}
  .chip.sel{background:var(--accent);color:var(--bg);border-color:var(--accent);font-weight:700}
  .stopwatch{text-align:center;padding:26px 0 10px}
  .sw-book{font-size:14px;color:var(--muted);min-height:20px}
  .sw-time{font-size:clamp(46px,15vw,68px);font-weight:600;letter-spacing:.02em;margin:6px 0 4px}
  .sw-round{font-size:13px;color:var(--muted)}
  .sw-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--danger);margin-right:6px;vertical-align:middle}
  .sw-dot.run{background:var(--accent);animation:pulse 1.6s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .sw-controls{display:flex;gap:12px;margin-top:16px}

  /* 통계 */
  .stat-grid{display:flex;gap:10px}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px}
  .stat .v{font-size:24px;font-weight:700;color:var(--accent)}
  .stat .c{font-size:12px;color:var(--muted);margin-top:2px}
  .barrow{display:flex;align-items:center;gap:10px;margin:8px 0}
  .barrow .lbl{width:34%;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .barrow .track{flex:1;background:var(--surface-2);border-radius:6px;height:20px;overflow:hidden}
  .barrow .fill{height:100%;background:var(--accent);border-radius:6px}
  .barrow .fill.g2{background:var(--accent-2)}
  .barrow .val{font-size:12px;color:var(--muted);width:64px;text-align:right}
  .days{display:flex;align-items:flex-end;gap:6px;height:120px;padding-top:8px}
  .day{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;height:100%;justify-content:flex-end}
  .day .b{width:100%;max-width:22px;background:var(--surface-2);border-radius:5px 5px 2px 2px;min-height:3px}
  .day .b.has{background:var(--accent)}
  .day .d{font-size:10px;color:var(--muted)}
  select,input[type=text],input[type=number],input[type=date]{
    background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 12px;font-size:15px;font-family:inherit;width:100%}
  label.f{display:block;font-size:13px;color:var(--muted);margin:10px 2px 5px}

  /* 기록 */
  .log-date{font-size:13px;font-weight:600;margin:16px 4px 8px;display:flex;justify-content:space-between}
  .log-date span{color:var(--muted);font-weight:500}
  .log-item{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:7px}
  .log-item .sw{width:9px;height:9px;border-radius:50%;background:var(--accent);flex:none}
  .log-item .t{flex:1;font-size:14px;min-width:0}
  .log-item .t .b{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .log-item .t .m{font-size:12px;color:var(--muted)}
  .log-item .dur{font-size:13px;color:var(--muted)}
  .log-item .del{background:none;border:none;color:var(--muted);font-size:17px;cursor:pointer;padding:4px 6px}
  .empty{color:var(--muted);font-size:14px;text-align:center;padding:36px 12px;line-height:1.6}

  /* 교재 */
  .book-item{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:9px}
  .book-item .info{flex:1;min-width:0}
  .book-item .nm{font-weight:600;font-size:15px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .book-item .sub{font-size:12px;color:var(--muted);margin-top:3px}
  .book-item .acts{display:flex;gap:6px;flex:none}
  .mini{background:var(--surface-2);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 10px;font-size:13px;cursor:pointer}
  .mini.warn{color:var(--danger)}

  /* 시트/모달 */
  .sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;z-index:40}
  .sheet-bg.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-radius:20px 20px 0 0;
    padding:10px 18px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);
    transition:transform .28s cubic-bezier(.2,.8,.2,1);z-index:41;max-width:560px;margin:0 auto;max-height:88dvh;overflow-y:auto}
  .sheet.open{transform:translateY(0)}
  .grip{width:40px;height:4px;background:var(--line);border-radius:2px;margin:8px auto 12px}
  .sheet h2{font-size:16px;font-weight:700;margin:6px 2px 12px}
  .switch{position:relative;width:50px;height:30px;flex:none}
  .switch input{opacity:0;width:0;height:0}
  .slider{position:absolute;inset:0;background:var(--surface-2);border-radius:999px;transition:.2s;cursor:pointer}
  .slider::before{content:"";position:absolute;width:24px;height:24px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider::before{transform:translateX(20px)}
  .set-item{display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);border-radius:12px;padding:13px 14px;margin-bottom:9px}
  .toast{position:fixed;left:50%;bottom:calc(22px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);
    background:var(--surface-2);color:var(--text);border:1px solid var(--line);padding:11px 18px;border-radius:999px;font-size:14px;opacity:0;pointer-events:none;transition:.3s;z-index:60}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
  <header>
    <h1>공부시간 트래커</h1>
    <button class="gear" id="gear">⚙</button>
  </header>
  <nav class="tabs">
    <button class="tab active" data-view="timer">타이머</button>
    <button class="tab" data-view="books">교재</button>
    <button class="tab" data-view="stats">통계</button>
    <button class="tab" data-view="log">기록</button>
  </nav>

  <main>
    <!-- 타이머 -->
    <section id="v-timer" class="view active">
      <div class="section-title">교재 선택</div>
      <div class="book-chips" id="bookChips"></div>
      <div class="card">
        <div class="stopwatch">
          <div class="sw-book" id="swBook">교재를 선택하세요</div>
          <div class="sw-time num" id="swTime">00:00:00</div>
          <div class="sw-round"><span class="sw-dot" id="swDot"></span><span id="swState">대기</span></div>
        </div>
        <div class="sw-controls">
          <button class="btn btn-accent btn-block" id="swStart">시작</button>
          <button class="btn btn-ghost" id="swStop" style="display:none">종료·저장</button>
        </div>
      </div>
      <div class="card small"><span class="muted">오늘 순공</span> <b class="num" id="todayTotal">0분</b> · <span class="muted">누적</span> <b class="num" id="grandTotal">0분</b></div>
    </section>

    <!-- 교재 -->
    <section id="v-books" class="view">
      <div class="section-title">교재 목록</div>
      <div id="bookList"></div>
      <button class="btn btn-surface btn-block" id="addBook" style="margin-top:6px">＋ 교재 추가</button>
    </section>

    <!-- 통계 -->
    <section id="v-stats" class="view">
      <div class="section-title">순공 시간</div>
      <div class="stat-grid">
        <div class="stat"><div class="v num" id="sTotal">0h</div><div class="c">전체 누적</div></div>
        <div class="stat"><div class="v num" id="sToday">0h</div><div class="c">오늘</div></div>
        <div class="stat"><div class="v num" id="sWeek">0h</div><div class="c">최근 7일</div></div>
      </div>
      <div class="section-title">교재별 누적</div>
      <div class="card" id="byBook"></div>
      <div class="section-title">일자별 (최근 14일)</div>
      <div class="card"><div class="days" id="days"></div></div>
      <div class="section-title">회독 속도 — 얼마나 빨라지는지</div>
      <div class="card">
        <select id="speedBook"></select>
        <div id="speedView" style="margin-top:12px"></div>
      </div>
    </section>

    <!-- 기록 -->
    <section id="v-log" class="view">
      <div class="section-title">세션 기록</div>
      <button class="btn btn-surface btn-block" id="addSession" style="margin-bottom:6px">＋ 수동으로 시간 추가</button>
      <div id="logList"></div>
    </section>
  </main>

  <!-- 설정 시트 -->
  <div class="sheet-bg" id="sheetBg"></div>
  <div class="sheet" id="sheet"><div class="grip"></div><div id="sheetBody"></div></div>

  <div class="toast" id="toast"></div>

<script>
"use strict";
/* 공부시간 트래커 — 서버 없음 · IndexedDB 저장 · 오프라인.
   순공: 교재 선택 후 스톱워치(카운트업). 진행 중 상태를 주기적으로 체크포인트 저장 →
   앱이 꺼져도 마지막 저장 지점까지 복구(정지 상태로). 오프라인 공백을 과대 집계하지 않음. */

/* ---------- IndexedDB ---------- */
const DBN="study-tracker-db", DBV=1; let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DBN,DBV);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains("books")){d.createObjectStore("books",{keyPath:"id",autoIncrement:true});}
    if(!d.objectStoreNames.contains("sessions")){const s=d.createObjectStore("sessions",{keyPath:"id",autoIncrement:true});s.createIndex("bookId","bookId");s.createIndex("dateKey","dateKey");}
    if(!d.objectStoreNames.contains("meta")){d.createObjectStore("meta",{keyPath:"key"});}};
  r.onsuccess=()=>{db=r.result;res();};r.onerror=()=>rej(r.error);});}
const store=(n,m="readonly")=>db.transaction(n,m).objectStore(n);
const put=(n,v)=>new Promise((res,rej)=>{const r=store(n,"readwrite").put(v);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const del=(n,k)=>new Promise((res,rej)=>{const r=store(n,"readwrite").delete(k);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
const get=(n,k)=>new Promise((res,rej)=>{const r=store(n).get(k);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const all=(n)=>new Promise((res,rej)=>{const r=store(n).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
const clearStore=(n)=>new Promise((res,rej)=>{const r=store(n,"readwrite").clear();r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});

/* ---------- 상태 ---------- */
let books=[], sessions=[], selBookId=null;
let active=null; // {bookId, accMs, running, lastResumeTs, startedAt}
let swInt=null, cpInt=null, wakeLock=null, wakeOn=false;

/* ---------- 유틸 ---------- */
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,"0");
const dateKey=(d=new Date())=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
function fmtClock(ms){const t=Math.floor(ms/1000);return pad(Math.floor(t/3600))+":"+pad(Math.floor(t%3600/60))+":"+pad(t%60);}
function fmtDur(sec){sec=Math.round(sec);const h=Math.floor(sec/3600),m=Math.floor(sec%3600/60);
  if(h>0&&m>0)return h+"시간 "+m+"분"; if(h>0)return h+"시간"; if(m>0)return m+"분"; return sec+"초";}
function fmtH(sec){return (sec/3600).toFixed(1)+"h";}
function bookName(id){const b=books.find(x=>x.id===id);return b?b.name:"(삭제된 교재)";}
function toast(m){const t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(toast._t);toast._t=setTimeout(()=>t.classList.remove("show"),1800);}

/* ---------- 화면 켜짐 ---------- */
async function reqWake(){if(!wakeOn||!("wakeLock"in navigator))return;try{wakeLock=await navigator.wakeLock.request("screen");}catch(e){}}
function relWake(){if(wakeLock){wakeLock.release().catch(()=>{});wakeLock=null;}}
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="hidden"){checkpoint();}
  else if(document.visibilityState==="visible"&&active&&active.running&&wakeOn){reqWake();}
});
window.addEventListener("pagehide",checkpoint);

/* ---------- 스톱워치 엔진 ---------- */
function elapsedMs(){if(!active)return 0;return active.accMs+(active.running?(Date.now()-active.lastResumeTs):0);}
async function persistActive(){if(active)await put("meta",{key:"active",value:active}); else await del("meta","active");}
function checkpoint(){if(active&&active.running){active.accMs+=Date.now()-active.lastResumeTs;active.lastResumeTs=Date.now();persistActive();}}

async function swStart(){
  if(!active){ // 새 세션
    if(!selBookId){toast("먼저 교재를 선택하세요");return;}
    active={bookId:selBookId,accMs:0,running:true,lastResumeTs:Date.now(),startedAt:new Date().toISOString()};
  }else{ // 일시정지 상태에서 재개
    active.running=true;active.lastResumeTs=Date.now();
  }
  await persistActive();reqWake();startLoops();renderSW();
}
async function swPause(){checkpoint();active.running=false;await persistActive();stopLoops();relWake();renderSW();}
async function swStopSave(){
  checkpoint();
  const sec=Math.round(active.accMs/1000);
  if(sec>=1){
    const b=books.find(x=>x.id===active.bookId);
    await put("sessions",{bookId:active.bookId,seconds:sec,startedAt:active.startedAt,endedAt:new Date().toISOString(),
      round:b?b.round:1,dateKey:dateKey(new Date())});
  }
  active=null;await persistActive();stopLoops();relWake();
  await reload();switchView("timer");renderSW();toast(sec>=1?("저장됨 · "+fmtDur(sec)):"1초 미만은 저장 안 함");
}
function startLoops(){stopLoops();swInt=setInterval(renderSWTime,1000);cpInt=setInterval(checkpoint,10000);}
function stopLoops(){clearInterval(swInt);clearInterval(cpInt);swInt=cpInt=null;}

/* ---------- 렌더: 타이머 ---------- */
function renderChips(){
  const c=$("bookChips");c.innerHTML="";
  const act=books.filter(b=>!b.archived);
  if(act.length===0){c.innerHTML='<span class="muted small" style="padding:8px 0">교재 탭에서 교재를 먼저 추가하세요.</span>';return;}
  act.forEach(b=>{const el=document.createElement("button");el.className="chip"+(b.id===selBookId?" sel":"");el.textContent=b.name;
    el.onclick=()=>{if(active){toast("진행 중에는 교재를 바꿀 수 없습니다");return;}selBookId=b.id;renderChips();renderSW();};c.appendChild(el);});
}
function renderSWTime(){$("swTime").textContent=fmtClock(elapsedMs());}
function renderSW(){
  const running=active&&active.running, paused=active&&!active.running;
  const bId=active?active.bookId:selBookId;
  $("swBook").textContent=bId?bookName(bId):"교재를 선택하세요";
  renderSWTime();
  $("swDot").className="sw-dot"+(running?" run":"");
  $("swState").textContent=running?"측정 중":paused?"일시정지":"대기";
  $("swStart").textContent=running?"일시정지":paused?"이어서":"시작";
  $("swStart").className="btn btn-block "+(running?"btn-surface":"btn-accent");
  $("swStop").style.display=active?"block":"none";
  $("swStop").classList.toggle("btn-block",false);
}
async function refreshTotals(){
  const today=dateKey(), t=sessions.filter(s=>s.dateKey===today).reduce((a,s)=>a+s.seconds,0);
  const g=sessions.reduce((a,s)=>a+s.seconds,0);
  $("todayTotal").textContent=fmtDur(t);$("grandTotal").textContent=fmtDur(g);
}

/* ---------- 렌더: 교재 ---------- */
function renderBooks(){
  const wrap=$("bookList");wrap.innerHTML="";
  if(books.length===0){wrap.innerHTML='<div class="empty">등록된 교재가 없습니다.<br>아래 버튼으로 첫 교재를 추가하세요.</div>';return;}
  books.forEach(b=>{
    const sec=sessions.filter(s=>s.bookId===b.id).reduce((a,s)=>a+s.seconds,0);
    const el=document.createElement("div");el.className="book-item";
    el.innerHTML=`<div class="info"><div class="nm">${esc(b.name)}${b.archived?' <span class="muted small">(보관)</span>':''}</div>
      <div class="sub">누적 ${fmtDur(sec)} · 현재 ${b.round}회독</div></div>
      <div class="acts">
        <button class="mini" data-a="round">회독+1</button>
        <button class="mini" data-a="edit">이름</button>
        <button class="mini warn" data-a="del">삭제</button>
      </div>`;
    el.querySelector('[data-a=round]').onclick=async()=>{b.round=(b.round||1)+1;await put("books",b);await reload();toast(b.name+" → "+b.round+"회독 시작");};
    el.querySelector('[data-a=edit]').onclick=async()=>{const n=prompt("교재 이름",b.name);if(n&&n.trim()){b.name=n.trim();await put("books",b);await reload();}};
    el.querySelector('[data-a=del]').onclick=async()=>{
      const cnt=sessions.filter(s=>s.bookId===b.id).length;
      if(confirm(`'${b.name}' 삭제? 관련 기록 ${cnt}건도 함께 삭제됩니다.`)){
        for(const s of sessions.filter(s=>s.bookId===b.id))await del("sessions",s.id);
        await del("books",b.id);if(selBookId===b.id)selBookId=null;await reload();toast("삭제됨");}};
    wrap.appendChild(el);
  });
}
async function addBookFlow(){const n=prompt("교재 이름 (예: 투운사 기본서 1권)");if(n&&n.trim()){
  const id=await put("books",{name:n.trim(),round:1,createdAt:new Date().toISOString(),archived:false});
  await reload();if(!selBookId)selBookId=id;renderChips();renderSW();toast("추가됨");}}

/* ---------- 렌더: 통계 ---------- */
function renderStats(){
  const today=dateKey();
  const tot=sessions.reduce((a,s)=>a+s.seconds,0);
  const tod=sessions.filter(s=>s.dateKey===today).reduce((a,s)=>a+s.seconds,0);
  const wk=lastNDates(7);
  const wsec=sessions.filter(s=>wk.includes(s.dateKey)).reduce((a,s)=>a+s.seconds,0);
  $("sTotal").textContent=fmtH(tot);$("sToday").textContent=fmtH(tod);$("sWeek").textContent=fmtH(wsec);

  // 교재별 막대
  const bb=$("byBook");bb.innerHTML="";
  const rows=books.map(b=>({name:b.name,sec:sessions.filter(s=>s.bookId===b.id).reduce((a,s)=>a+s.seconds,0)}))
    .filter(r=>r.sec>0).sort((a,b)=>b.sec-a.sec);
  if(rows.length===0){bb.innerHTML='<div class="empty small">아직 기록이 없습니다.</div>';}
  else{const mx=Math.max(...rows.map(r=>r.sec));rows.forEach(r=>{
    const el=document.createElement("div");el.className="barrow";
    el.innerHTML=`<div class="lbl">${esc(r.name)}</div><div class="track"><div class="fill" style="width:${r.sec/mx*100}%"></div></div><div class="val num">${fmtDur(r.sec)}</div>`;
    bb.appendChild(el);});}

  // 일자별 14일
  const dwrap=$("days");dwrap.innerHTML="";
  const dts=lastNDates(14).reverse();
  const dsec=dts.map(k=>sessions.filter(s=>s.dateKey===k).reduce((a,s)=>a+s.seconds,0));
  const dmx=Math.max(1,...dsec);
  dts.forEach((k,i)=>{const el=document.createElement("div");el.className="day";
    const label=(new Date(k)).getDate();
    el.innerHTML=`<div class="b ${dsec[i]?'has':''}" style="height:${dsec[i]/dmx*100}%" title="${fmtDur(dsec[i])}"></div><div class="d">${label}</div>`;
    dwrap.appendChild(el);});

  renderSpeedOptions();renderSpeed();
}
function renderSpeedOptions(){
  const sel=$("speedBook");const cur=sel.value;
  sel.innerHTML='<option value="">교재 선택…</option>'+books.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join("");
  if(cur)sel.value=cur;
}
function renderSpeed(){
  const v=$("speedView");const bid=parseInt($("speedBook").value,10);
  if(!bid){v.innerHTML='<div class="empty small">교재를 선택하면 회독별 소요 시간을 비교합니다.</div>';return;}
  const ss=sessions.filter(s=>s.bookId===bid);
  if(ss.length===0){v.innerHTML='<div class="empty small">이 교재의 기록이 없습니다.</div>';return;}
  const byRound={};ss.forEach(s=>{const r=s.round||1;byRound[r]=(byRound[r]||0)+s.seconds;});
  const rounds=Object.keys(byRound).map(Number).sort((a,b)=>a-b);
  const mx=Math.max(...rounds.map(r=>byRound[r]));
  let html="";rounds.forEach((r,i)=>{
    let delta="";
    if(i>0){const prev=byRound[rounds[i-1]];const d=byRound[r]-prev;const pct=Math.round(d/prev*100);
      delta=`<span class="small" style="color:${d<0?'var(--accent-2)':'var(--danger)'}">${d<0?'▼':'▲'}${Math.abs(pct)}%</span>`;}
    html+=`<div class="barrow"><div class="lbl">${r}회독 ${delta}</div><div class="track"><div class="fill ${i%2?'g2':''}" style="width:${byRound[r]/mx*100}%"></div></div><div class="val num">${fmtDur(byRound[r])}</div></div>`;});
  const done=rounds.filter(r=>r<Math.max(...rounds)||!active);
  html+=`<div class="small muted" style="margin-top:8px">막대가 짧아질수록(▼) 회독 속도가 빨라진 것입니다.</div>`;
  v.innerHTML=html;
}

/* ---------- 렌더: 기록 ---------- */
function renderLog(){
  const wrap=$("logList");wrap.innerHTML="";
  if(sessions.length===0){wrap.innerHTML='<div class="empty">아직 세션 기록이 없습니다.<br>타이머로 측정하거나 수동으로 추가하세요.</div>';return;}
  const byDay={};sessions.forEach(s=>{(byDay[s.dateKey]||=[]).push(s);});
  Object.keys(byDay).sort().reverse().forEach(k=>{
    const items=byDay[k].sort((a,b)=>(b.endedAt||"").localeCompare(a.endedAt||""));
    const sum=items.reduce((a,s)=>a+s.seconds,0);
    const head=document.createElement("div");head.className="log-date";head.innerHTML=`<div>${k}</div><span class="num">${fmtDur(sum)}</span>`;
    wrap.appendChild(head);
    items.forEach(s=>{const el=document.createElement("div");el.className="log-item";
      const tm=s.endedAt?new Date(s.endedAt):null;
      el.innerHTML=`<div class="sw"></div><div class="t"><div class="b">${esc(bookName(s.bookId))}</div>
        <div class="m">${s.round||1}회독${tm?' · '+pad(tm.getHours())+':'+pad(tm.getMinutes()):''}</div></div>
        <div class="dur num">${fmtDur(s.seconds)}</div><button class="del">✕</button>`;
      el.querySelector(".del").onclick=async()=>{if(confirm("이 세션을 삭제할까요?")){await del("sessions",s.id);await reload();}};
      wrap.appendChild(el);});
  });
}
async function addSessionFlow(){
  if(books.length===0){toast("교재를 먼저 추가하세요");switchView("books");return;}
  openSheet(`<h2>수동 시간 추가</h2>
    <label class="f">교재</label><select id="mBook">${books.map(b=>`<option value="${b.id}">${esc(b.name)} (${b.round}회독)</option>`).join("")}</select>
    <label class="f">날짜</label><input type="date" id="mDate" value="${dateKey()}">
    <div class="row"><div style="flex:1"><label class="f">시간(시)</label><input type="number" id="mH" min="0" value="0"></div>
    <div style="flex:1"><label class="f">분</label><input type="number" id="mM" min="0" max="59" value="30"></div></div>
    <button class="btn btn-accent btn-block" id="mSave" style="margin-top:16px">추가</button>`);
  $("mSave").onclick=async()=>{
    const bid=parseInt($("mBook").value,10);const b=books.find(x=>x.id===bid);
    const sec=(parseInt($("mH").value||0,10)*3600)+(parseInt($("mM").value||0,10)*60);
    if(sec<=0){toast("시간을 입력하세요");return;}
    const dk=$("mDate").value||dateKey();
    await put("sessions",{bookId:bid,seconds:sec,startedAt:dk+"T00:00:00",endedAt:dk+"T00:00:00",round:b?b.round:1,dateKey:dk});
    closeSheet();await reload();toast("추가됨 · "+fmtDur(sec));};
}

/* ---------- 시트/설정 ---------- */
const sheet=$("sheet"),sheetBg=$("sheetBg");
function openSheet(html){$("sheetBody").innerHTML=html;sheet.classList.add("open");sheetBg.classList.add("open");}
function closeSheet(){sheet.classList.remove("open");sheetBg.classList.remove("open");}
sheetBg.onclick=closeSheet;
$("gear").onclick=()=>{openSheet(`<h2>설정</h2>
  <div class="set-item"><div><div>화면 켜짐 유지</div><div class="small muted">측정 중 화면이 꺼지지 않게</div></div>
    <label class="switch"><input type="checkbox" id="optWake" ${wakeOn?'checked':''}><span class="slider"></span></label></div>
  <div class="section-title">데이터</div>
  <button class="btn btn-surface btn-block" id="expJson" style="margin-bottom:8px">JSON 내보내기</button>
  <button class="btn btn-surface btn-block" id="expMd" style="margin-bottom:8px">마크다운 내보내기 (Obsidian)</button>
  <button class="btn btn-ghost btn-block" id="wipe">모든 데이터 삭제</button>`);
  $("optWake").onchange=e=>{wakeOn=e.target.checked;put("meta",{key:"wakeOn",value:wakeOn});if(wakeOn&&active&&active.running)reqWake();else if(!wakeOn)relWake();};
  $("expJson").onclick=exportJSON;$("expMd").onclick=exportMD;
  $("wipe").onclick=async()=>{if(confirm("모든 교재·기록을 삭제할까요? 되돌릴 수 없습니다.")){
    await clearStore("sessions");await clearStore("books");await del("meta","active");active=null;selBookId=null;await reload();closeSheet();toast("전체 삭제됨");}};
};

/* ---------- 내보내기 ---------- */
function download(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function exportJSON(){download("study-"+dateKey()+".json",JSON.stringify({books,sessions},null,2),"application/json");}
function exportMD(){
  const tot=sessions.reduce((a,s)=>a+s.seconds,0);
  let md=`# 공부시간 기록 (${dateKey()})\n\n총 순공: **${fmtDur(tot)}**\n\n## 교재별\n\n`;
  books.forEach(b=>{const sec=sessions.filter(s=>s.bookId===b.id).reduce((a,s)=>a+s.seconds,0);
    md+=`- ${b.name} — ${fmtDur(sec)} (현재 ${b.round}회독)\n`;});
  md+=`\n## 세션 로그\n\n| 날짜 | 교재 | 회독 | 시간 |\n|---|---|---|---|\n`;
  sessions.slice().sort((a,b)=>a.dateKey.localeCompare(b.dateKey)).forEach(s=>{
    md+=`| ${s.dateKey} | ${bookName(s.bookId)} | ${s.round||1} | ${fmtDur(s.seconds)} |\n`;});
  download("study-"+dateKey()+".md",md,"text/markdown");
}

/* ---------- 공통 ---------- */
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function lastNDates(n){const a=[];for(let i=0;i<n;i++){const d=new Date();d.setDate(d.getDate()-i);a.push(dateKey(d));}return a;}
function switchView(v){document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active",t.dataset.view===v));
  document.querySelectorAll(".view").forEach(s=>s.classList.remove("active"));$("v-"+v).classList.add("active");
  if(v==="stats")renderStats();if(v==="log")renderLog();if(v==="books")renderBooks();if(v==="timer"){renderChips();renderSW();}}
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>switchView(t.dataset.view));
$("swStart").onclick=()=>{if(active&&active.running)swPause();else swStart();};
$("swStop").onclick=swStopSave;
$("addBook").onclick=addBookFlow;
$("addSession").onclick=addSessionFlow;
$("speedBook").onchange=renderSpeed;

async function reload(){books=await all("books");sessions=await all("sessions");
  renderChips();renderSW();refreshTotals();
  if($("v-books").classList.contains("active"))renderBooks();
  if($("v-stats").classList.contains("active"))renderStats();
  if($("v-log").classList.contains("active"))renderLog();}

/* ---------- 초기화 ---------- */
(async function init(){
  await openDB();
  const w=await get("meta","wakeOn");wakeOn=w?!!w.value:false;
  const a=await get("meta","active");
  if(a&&a.value){active=a.value;active.running=false;active.lastResumeTs=null; // 복구 시 정지 상태로
    selBookId=active.bookId;await persistActive();}
  await reload();renderSW();
  if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
})();
</script>
